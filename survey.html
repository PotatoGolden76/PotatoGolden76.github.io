<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <link rel="stylesheet" href="survey-styles.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Phobia Survey</title>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1 id="title" class="title  text-center">Phobia Survey</h1>
        <p id="description" class="description  text-center"> <em>Thank you for helping us understand phobias better.</em> </p>
      </header>

      <form id="survey-form" class="survey-form" action="index.html" method="post">
        <div class="survey-content-group">
          <label id="name-label" for="name">Name</label>
          <input type="text" id="name" name="name" class="control" placeholder="Enter a name" required/>
        </div>

        <div class="survey-content-group">
          <label id="email-label" for="email">Email</label>
          <input type="email" id="email" name="email" class="control" placeholder="Enter an email adress" required/>
        </div>

        <div class="survey-content-group">
          <label id="number-label" for="number">Age <span class="clue">(optional)</span></label>
          <input type="number" id="number" min="13" max="90"name="number" class="control" placeholder="Enter your age"/>
        </div>

        <div class="survey-content-group">
          <p>Do phobias affect your sleep cycle?</p>
          <label><input type="radio" name="sleep-cycle" value="yes" class="radio-input" checked>Yes</label>
          <label><input type="radio" name="sleep-cycle" value="no" class="radio-input">No</label>
          <label><input type="radio" name="sleep-cycle" value="sometimes" class="radio-input">Sometimes</label>
        </div>

        <div class="survey-content-group">
          <p>How are you dealing with your phobias?</p>
          <select id="dropdown" class="control" name="methods" required>
            <option selected disabled value>Please select a method</option>
            <option value="exposure">Exposure</option>
            <option value="avoidance">Avoidance</option>
            <option value="psychotherapy">Psychotherapy</option>
            <option value="cbt">Cognitive behavioral therapy</option>
            <option value="meds">Medication</option>
            <option value="other">Other/None</option>
          </select>
        </div>

        <div class="survey-content-group">
          <p>What are your phobias? <span class="clue">(select all that apply)</span></p>
          <label><input type="checkbox" name="phobias" value="acrophobia" class="checkbox-input">Acrophobia, the fear of heights.</label>
          <label><input type="checkbox" name="phobias" value="aerophobia" class="checkbox-input">Aerophobia, the fear of flying.</label>
          <label><input type="checkbox" name="phobias" value="arachnophobia" class="checkbox-input">Arachnophobia, the fear of spiders.</label>
          <label><input type="checkbox" name="phobias" value="astraphobia" class="checkbox-input">Astraphobia, the fear of thunder and lightning.</label>
          <label><input type="checkbox" name="phobias" value="nyctophobia" class="checkbox-input">Nyctophobia, the fear of darkness.</label>
          <label><input type="checkbox" name="phobias" value="claustrophobia" class="checkbox-input">Claustrophobia, the fear of confined or crowded spaces.</label>
          <label><input type="checkbox" name="phobias" value="hemophobia" class="checkbox-input">Hemophobia, the fear of blood.</label>
          <label><input type="checkbox" name="phobias" value="hydrophobia" class="checkbox-input">Hydrophobia, the fear of water.</label>
        </div>

        <div class="survey-content-group">
          <p>Tell us more about your experiences with phobias:</p>
          <textarea name="experiences" id="experiences" class="textarea-input" placeholder="Enter your experiences here."></textarea>
        </div>

        <div class="survey-content-group">
            <button type="submit" id="submit" name="submit">Submit</button>
        </div>
      </form>
    </div>
  </body>
  <script></script>
  <script type="text/javascript" src="https://cdn.freecodecamp.org/testable-projects-fcc/v1/bundle.js"></script>
</html>
